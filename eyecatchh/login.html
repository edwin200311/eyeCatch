<!DOCTYPE html>
<html lang="ko" class="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eye Catch - 로그인</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#003d9b",
              "surface-container-high": "#e7e8e9",
              "surface-container-highest": "#e1e3e4",
              "surface-container-lowest": "#ffffff",
              "on-surface": "#191c1d",
              "on-surface-variant": "#434654",
              "outline": "#737685",
              "on-primary": "#ffffff",
              "background": "#f8f9fa",
              "surface-container-low": "#f3f4f5"
            },
            fontFamily: {
              headline: ["Manrope"],
              body: ["Inter"]
            }
          }
        }
      }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .font-headline { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .bg-login-gradient { background: linear-gradient(135deg, #003d9b 0%, #0052cc 100%); }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col">
    <main class="flex-grow flex items-center justify-center p-6 relative overflow-hidden">
        <div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-primary/5 rounded-full blur-3xl"></div>
        <div class="w-full max-w-md z-10">
            <div class="flex flex-col items-center mb-12">
                <div class="w-16 h-16 bg-surface-container-lowest rounded-full flex items-center justify-center shadow-sm mb-4">
                    <span class="material-symbols-outlined text-primary text-4xl">visibility</span>
                </div>
                <h1 class="font-headline text-3xl font-extrabold tracking-tighter text-on-surface">Eye Catch</h1>
                <p class="text-on-surface-variant text-sm mt-2 font-medium">안전을 지키는 스마트한 시선</p>
            </div>

            <div class="bg-surface-container-lowest rounded-xl p-8 shadow-lg">
                <div class="mb-8">
                    <h2 class="text-2xl font-bold font-headline text-on-surface mb-1">로그인</h2>
                    <p class="text-on-surface-variant text-sm">계정 정보를 입력하여 관리 센터에 접속하세요.</p>
                </div>
                
                <form id="loginForm" class="space-y-6">
                    <div class="space-y-2">
                        <label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-wider px-1">이메일 주소</label>
                        <input id="loginEmail" type="email" class="w-full bg-surface-container-high border-none rounded-lg px-4 py-3.5 focus:ring-0 focus:bg-surface-container-highest transition-all" placeholder="name@company.com" required>
                    </div>
                    
                    <div class="space-y-2">
                        <div class="flex justify-between items-center px-1">
                            <label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider">비밀번호</label>
                        </div>
                        <input id="loginPassword" type="password" class="w-full bg-surface-container-high border-none rounded-lg px-4 py-3.5 focus:ring-0 focus:bg-surface-container-highest transition-all" placeholder="••••••••" required>
                    </div>
                    
                    <div class="pt-2 space-y-4">
                        <button type="submit" class="flex items-center justify-center w-full bg-login-gradient text-on-primary font-bold py-4 rounded-xl shadow-md active:scale-95 transition-all">
                            로그인
                        </button>
                        
                        <div class="relative flex items-center py-2">
                            <div class="flex-grow border-t border-surface-container-highest"></div>
                            <span class="flex-shrink mx-4 text-xs font-medium text-outline">또는</span>
                            <div class="flex-grow border-t border-surface-container-highest"></div>
                        </div>
                        
                        <a href="signup.html" class="flex items-center justify-center w-full bg-transparent border border-outline-variant text-on-surface font-semibold py-3.5 rounded-xl hover:bg-surface-container-low transition-all">
                            회원가입 하기
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script>
        // 로그인 처리 스크립트
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); // 폼 기본 제출 방지
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            // localStorage에서 가입된 유저 정보 가져오기
            const savedUser = JSON.parse(localStorage.getItem('eyeCatchUser'));

            if (savedUser && savedUser.email === email && savedUser.password === password) {
                alert(savedUser.name + '님, 환영합니다!');
                // 로그인 성공 시 메인 화면으로 이동
                window.location.href = 'main.html'; 
            } else {
                alert('이메일 또는 비밀번호가 일치하지 않거나, 가입된 정보가 없습니다.');
            }
        });
    </script>
</body>
</html>
