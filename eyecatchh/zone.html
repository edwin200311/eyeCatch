<!DOCTYPE html>
<html class="light" lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Eye Catch - 위험 구역 설정</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-tertiary-fixed": "#380d00",
                        "tertiary-fixed": "#ffdbcf",
                        "secondary-fixed": "#d6e3fb",
                        "on-secondary-fixed": "#0f1c2d",
                        "surface-container-high": "#e7e8e9",
                        "on-secondary-container": "#586579",
                        "background": "#f8f9fa",
                        "on-primary-container": "#c4d2ff",
                        "tertiary-container": "#a33500",
                        "secondary-fixed-dim": "#bac7de",
                        "on-background": "#191c1d",
                        "on-error-container": "#93000a",
                        "on-error": "#ffffff",
                        "inverse-surface": "#2e3132",
                        "secondary": "#525f73",
                        "error-container": "#ffdad6",
                        "on-surface": "#191c1d",
                        "surface-container-low": "#f3f4f5",
                        "surface-tint": "#0c56d0",
                        "surface-container": "#edeeef",
                        "outline-variant": "#c3c6d6",
                        "on-primary": "#ffffff",
                        "outline": "#737685",
                        "on-primary-fixed": "#001848",
                        "on-secondary-fixed-variant": "#3b485a",
                        "primary-fixed-dim": "#b2c5ff",
                        "surface-bright": "#f8f9fa",
                        "on-primary-fixed-variant": "#0040a2",
                        "on-tertiary-fixed-variant": "#812800",
                        "on-tertiary-container": "#ffc6b2",
                        "surface-variant": "#e1e3e4",
                        "surface-dim": "#d9dadb",
                        "error": "#ba1a1a",
                        "secondary-container": "#d6e3fb",
                        "on-secondary": "#ffffff",
                        "on-surface-variant": "#434654",
                        "surface-container-highest": "#e1e3e4",
                        "inverse-on-surface": "#f0f1f2",
                        "inverse-primary": "#b2c5ff",
                        "tertiary-fixed-dim": "#ffb59b",
                        "primary-container": "#0052cc",
                        "primary": "#003d9b",
                        "on-tertiary": "#ffffff",
                        "primary-fixed": "#dae2ff",
                        "surface": "#f8f9fa",
                        "tertiary": "#7b2600",
                        "surface-container-lowest": "#ffffff"
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background font-body text-on-surface antialiased">
    <!-- TopAppBar -->
    <header class="bg-slate-50/70 dark:bg-slate-900/70 backdrop-blur-xl docked full-width top-0 sticky z-50 shadow-sm dark:shadow-none flex justify-between items-center px-6 py-4 w-full">
        <!-- 뒤로가기 버튼이 있던 자리를 지우고 타이틀만 남김 -->
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-blue-700 dark:text-blue-400" data-icon="visibility">visibility</span>
            <h1 class="text-xl font-black text-blue-900 dark:text-blue-50 tracking-tighter font-headline">Eye Catch</h1>
        </div>
        <div class="flex items-center gap-4">
            <button class="hover:bg-slate-200/50 dark:hover:bg-slate-800/50 scale-95 active:scale-90 transition-transform duration-200 p-2 rounded-full">
                <span class="material-symbols-outlined text-slate-500 dark:text-slate-400" data-icon="notifications_active">notifications_active</span>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 md:px-8 py-8">
        <!-- Header Section -->
        <div class="mb-8">
            <h2 class="text-3xl font-extrabold font-headline tracking-tight text-on-surface">위험 구역</h2>
            <p class="text-on-surface-variant mt-1">AI 탐지가 즉각적인 알림을 트리거할 영역을 정의합니다.</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Canvas Area (Bento Grid Main) -->
            <div class="lg:col-span-8 flex flex-col gap-4">
                <div class="relative aspect-video rounded-3xl overflow-hidden bg-surface-dim group cursor-crosshair">
                    <img alt="공장 바닥 작업 공간 전경" class="w-full h-full object-cover" data-alt="high-angle industrial factory floor with machinery, yellow floor markings, and safety paths in clean clinical lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCnTVKWflIQRksvfHaeMdz6kYDHnGb1LTf5m82duTAGLucAcxK9eLWZM_c3n1eqPM5Ai909lriUTjCl3TWAZW_jn7XfP-V9JuaFzPIlU-3uBkPuVNJg0qczP-OiOPepg2zZbeUqRFz_AMmKXhSfylZeBayI31kgIwsXhhJ_2I9vog_k9oI7oKO5hjMRx2bE0jbyKXkOf4cR37Px-oirJTSJ2CdYicW4dpg40I0bEkkkQtdysbnoQua3lIi1nyXKc2_Z-h_sXIIu6uQ"/>
                    <!-- SVG Overlay for Zones -->
                    <svg class="absolute inset-0 w-full h-full pointer-events-none">
                        <!-- Active Polygon Example -->
                        <polygon class="fill-tertiary/20 stroke-tertiary stroke-2" points="150,100 400,120 380,300 120,280"></polygon>
                        <!-- Vertex Handles -->
                        <circle class="fill-on-primary stroke-tertiary stroke-2 pointer-events-auto cursor-move" cx="150" cy="100" r="4"></circle>
                        <circle class="fill-on-primary stroke-tertiary stroke-2 pointer-events-auto cursor-move" cx="400" cy="120" r="4"></circle>
                        <circle class="fill-on-primary stroke-tertiary stroke-2 pointer-events-auto cursor-move" cx="380" cy="300" r="4"></circle>
                        <circle class="fill-on-primary stroke-tertiary stroke-2 pointer-events-auto cursor-move" cx="120" cy="280" r="4"></circle>
                        <!-- Secondary Zone -->
                        <polygon class="fill-primary/10 stroke-primary/40 stroke-2" points="600,200 800,250 750,450 550,400" stroke-dasharray="4"></polygon>
                    </svg>
                    <!-- Floating Tooltip -->
                    <div class="absolute top-4 left-4 glass-panel px-3 py-2 rounded-xl text-xs font-medium text-primary shadow-sm flex items-center gap-2">
                        <span class="material-symbols-outlined text-sm" data-icon="info">info</span>
                        클릭하여 꼭짓점 추가. 더블 클릭하여 다각형 닫기.
                    </div>
                    <!-- Toolbar Overlay -->
                    <div class="absolute bottom-6 left-1/2 -translate-x-1/2 flex gap-2 p-2 glass-panel rounded-full shadow-lg border border-white/20">
                        <button class="p-3 bg-primary text-white rounded-full shadow-md scale-95 active:scale-90 transition-all flex items-center gap-2 px-5">
                            <span class="material-symbols-outlined" data-icon="add_circle">add_circle</span>
                            <span class="text-sm font-semibold">구역 그리기</span>
                        </button>
                        <button class="p-3 bg-surface-container-highest text-on-surface rounded-full scale-95 active:scale-90 transition-all">
                            <span class="material-symbols-outlined" data-icon="backspace">backspace</span>
                        </button>
                        <div class="w-px h-8 bg-outline-variant/30 self-center"></div>
                        <button class="p-3 bg-surface-container-highest text-on-surface rounded-full scale-95 active:scale-90 transition-all">
                            <span class="material-symbols-outlined" data-icon="zoom_in">zoom_in</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Configuration Sidebar -->
            <div class="lg:col-span-4 flex flex-col gap-6">
                <!-- Zone List Card -->
                <div class="bg-surface-container-lowest rounded-3xl p-6 shadow-sm flex flex-col gap-4">
                    <h3 class="text-lg font-bold font-headline">활성 구역</h3>
                    <div class="space-y-3">
                        <!-- Zone Item 1 -->
                        <div class="flex items-center justify-between p-4 bg-surface-container-low rounded-xl group transition-all hover:bg-surface-container">
                            <div class="flex items-center gap-3">
                                <div class="w-2 h-8 bg-tertiary rounded-full"></div>
                                <div>
                                    <p class="font-bold text-sm">로봇 팔 알파</p>
                                    <p class="text-xs text-on-surface-variant">높은 민감도</p>
                                </div>
                            </div>
                            <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                <button class="p-2 text-on-surface-variant hover:text-primary"><span class="material-symbols-outlined text-sm" data-icon="edit">edit</span></button>
                                <button class="p-2 text-on-surface-variant hover:text-error"><span class="material-symbols-outlined text-sm" data-icon="delete">delete</span></button>
                            </div>
                        </div>
                        <!-- Zone Item 2 -->
                        <div class="flex items-center justify-between p-4 bg-surface-container-low rounded-xl group transition-all hover:bg-surface-container">
                            <div class="flex items-center gap-3">
                                <div class="w-2 h-8 bg-primary rounded-full"></div>
                                <div>
                                    <p class="font-bold text-sm">하역장 B</p>
                                    <p class="text-xs text-on-surface-variant">표준 알림</p>
                                </div>
                            </div>
                            <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                <button class="p-2 text-on-surface-variant hover:text-primary"><span class="material-symbols-outlined text-sm" data-icon="edit">edit</span></button>
                                <button class="p-2 text-on-surface-variant hover:text-error"><span class="material-symbols-outlined text-sm" data-icon="delete">delete</span></button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Settings Card -->
                <div class="bg-surface-container-lowest rounded-3xl p-6 shadow-sm">
                    <h3 class="text-lg font-bold font-headline mb-4">전역 매개변수</h3>
                    <div class="space-y-6">
                        <div class="space-y-2">
                            <label class="text-xs font-semibold text-on-surface-variant tracking-wider uppercase">탐지 정밀도</label>
                            <div class="h-1.5 w-full bg-surface-container-high rounded-full overflow-hidden">
                                <div class="h-full bg-primary w-3/4"></div>
                            </div>
                            <div class="flex justify-between text-[10px] text-on-surface-variant font-bold">
                                <span>유연함</span>
                                <span>정밀함</span>
                            </div>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-sm font-medium">정지된 물체 자동 무시</span>
                            <div class="w-10 h-6 bg-primary rounded-full relative p-1 cursor-pointer">
                                <div class="absolute right-1 top-1 w-4 h-4 bg-white rounded-full"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Save Actions -->
                <div class="mt-auto flex gap-3 pt-4">
                    <button class="flex-1 bg-surface-container-high text-on-surface font-bold py-3 rounded-full hover:bg-surface-variant transition-colors">취소</button>
                    <button class="flex-[2] bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold py-3 rounded-full shadow-lg scale-95 active:scale-90 transition-all flex justify-center items-center gap-2">
                        <span class="material-symbols-outlined text-lg" data-icon="save">save</span>
                        설정 저장
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- BottomNavBar -->
    <nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-4 pt-2 bg-slate-50 dark:bg-slate-800/50 shadow-[0_-4px_20px_rgba(0,24,72,0.04)] z-50 rounded-t-xl">
        <a href="main.html" class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-5 py-2 hover:text-blue-600 transition-all">
            <span class="material-symbols-outlined" data-icon="videocam">videocam</span>
            <span class="font-inter text-xs font-medium">모니터링</span>
        </a>
        <a href="zone.html" class="flex flex-col items-center justify-center bg-blue-50 dark:bg-blue-900/30 text-blue-800 dark:text-blue-100 rounded-2xl px-5 py-2 transition-all">
            <span class="material-symbols-outlined" data-icon="grid_view" style="font-variation-settings: 'FILL' 1;">grid_view</span>
            <span class="font-inter text-xs font-medium">구역</span>
        </a>
        <a href="history.html" class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-5 py-2 hover:text-blue-600 transition-all">
            <span class="material-symbols-outlined" data-icon="warning">warning</span>
            <span class="font-inter text-xs font-medium">사건 내역</span>
        </a>
        <a href="settings.html" class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-5 py-2 hover:text-blue-600 transition-all">
            <span class="material-symbols-outlined" data-icon="settings">settings</span>
            <span class="font-inter text-xs font-medium">설정</span>
        </a>
    </nav>

    <!-- Bottom Padding for Nav -->
    <div class="h-24 md:hidden"></div>
</body>
</html>
