<!DOCTYPE html>
<html lang="ko" class="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eye Catch - 위험 상황 로그</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: { colors: { "primary": "#003d9b", "tertiary": "#7b2600", "background": "#f8f9fa", "surface-container-lowest": "#ffffff" } }
            }
        }
    </script>
    <style> body { font-family: 'Inter', sans-serif; } .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; } </style>
</head>
<body class="bg-background min-h-screen pb-24 text-slate-900">
    <header class="bg-slate-50/70 backdrop-blur-xl fixed top-0 w-full z-50 shadow-sm flex justify-between items-center px-6 py-4">
        <h1 class="text-xl font-black text-blue-900 tracking-tighter">Eye Catch</h1>
    </header>

    <main class="pt-24 max-w-5xl mx-auto px-6">
        <h2 class="text-3xl font-extrabold tracking-tight mb-6">위험 상황 로그</h2>

        <div class="grid grid-cols-1 gap-6">
            <!-- 사건 리스트 -->
            <div class="bg-surface-container-lowest rounded-xl p-4 flex flex-col md:flex-row gap-6 shadow-sm hover:shadow-md transition-all">
                <div class="relative w-full md:w-64 h-40 bg-slate-200 rounded-lg overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1504328345606-18bbc8c9d7d1?auto=format&fit=crop&q=80" class="w-full h-full object-cover">
                    <div class="absolute top-3 left-3 bg-red-600 px-2 py-1 rounded text-[10px] font-bold text-white uppercase">실시간 보기</div>
                </div>
                <div class="flex flex-col justify-between py-1">
                    <div>
                        <span class="text-xs font-bold text-tertiary uppercase">구역 침입</span>
                        <h3 class="text-xl font-bold">미승인 출입: 북측 창고</h3>
                        <p class="text-sm text-slate-500 mt-1">2026년 4월 4일 오후 5:45</p>
                    </div>
                    <div class="flex gap-3 mt-4">
                        <!-- 클릭 시 상세 페이지로 이동 -->
                        <button onclick="location.href='incident_details.html'" class="bg-primary text-white px-6 py-2 rounded-lg font-bold text-sm shadow-md">
                            상세 보고서 보기
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 하단 네비게이션 바 -->
    <nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-4 pt-2 bg-white shadow-lg z-50 rounded-t-xl">
        <a href="main.html" class="flex flex-col items-center justify-center text-slate-500 px-5 py-2">
            <span class="material-symbols-outlined">videocam</span><span class="text-xs">모니터링</span>
        </a>
        <a href="zone.html" class="flex flex-col items-center justify-center text-slate-500 px-5 py-2">
            <span class="material-symbols-outlined">grid_view</span><span class="text-xs">구역</span>
        </a>
        <a href="history.html" class="flex flex-col items-center justify-center bg-blue-50 text-blue-800 rounded-2xl px-5 py-2">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">warning</span><span class="text-xs font-medium">사건 내역</span>
        </a>
        <a href="settings.html" class="flex flex-col items-center justify-center text-slate-500 px-5 py-2">
            <span class="material-symbols-outlined">settings</span><span class="text-xs">설정</span>
        </a>
    </nav>
</body>
</html>
