<!DOCTYPE html>
<html lang="ko" class="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eye Catch - 알림 상세 정보</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; background-color: #f8f9fa;} .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; } </style>
</head>
<body class="text-slate-900 min-h-screen pb-24">
    <header class="bg-slate-50/70 backdrop-blur-xl fixed top-0 w-full z-50 flex items-center px-6 py-4">
        <!-- 뒤로 가기 버튼: 이전 화면(history.html 등)으로 돌아갑니다 -->
        <button onclick="history.back()" class="p-2 -ml-2 text-slate-500 hover:text-blue-600 transition-colors">
            <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <span class="text-xl font-black text-blue-900 ml-4">Eye Catch 상세 보고서</span>
    </header>

    <main class="pt-24 max-w-5xl mx-auto px-4 space-y-8">
        <!-- 영상 영역 -->
        <div class="relative aspect-video bg-black rounded-3xl overflow-hidden shadow-lg">
            <img class="w-full h-full object-cover opacity-80" src="https://images.unsplash.com/photo-1504328345606-18bbc8c9d7d1?auto=format&fit=crop&q=80">
            <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                <div class="w-32 h-32 border-4 border-red-500 rounded-full animate-pulse flex items-center justify-center">
                    <span class="material-symbols-outlined text-red-500 text-4xl">warning</span>
                </div>
            </div>
        </div>

        <!-- 상세 내용 -->
        <div class="bg-white p-8 rounded-3xl shadow-sm">
            <span class="inline-block px-3 py-1 bg-red-100 text-red-800 text-xs font-bold rounded-full mb-3">위험 등급: 심각</span>
            <h1 class="text-3xl font-extrabold mb-2">북측 창고 무단 접근</h1>
            <p class="text-slate-500 mb-6">감지 시간: 오후 5:45:12</p>
            
            <h3 class="font-bold text-lg mb-2">상세 내용</h3>
            <p class="text-slate-600 leading-relaxed">
                인공지능이 활성화된 제한 구역 내에서 미승인 인원의 실루엣을 감지했습니다. 자동 경보 시퀀스가 시작되었으며, 보안 팀에 알림이 전송되었습니다.
            </p>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-4 pt-2 bg-white shadow-lg z-50 rounded-t-xl">
        <a href="main.html" class="flex flex-col items-center text-slate-500 px-5 py-2"><span class="material-symbols-outlined">videocam</span><span class="text-xs">모니터링</span></a>
        <a href="history.html" class="flex flex-col items-center bg-blue-50 text-blue-800 rounded-2xl px-5 py-2"><span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">warning</span><span class="text-xs font-medium">목록으로</span></a>
    </nav>
</body>
</html>
