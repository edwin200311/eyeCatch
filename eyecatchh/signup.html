<!DOCTYPE html>
<html lang="ko" class="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eye Catch - 회원가입</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#003d9b",
              "surface-container-high": "#e7e8e9",
              "surface-container-lowest": "#ffffff",
              "surface-container-low": "#f3f4f5",
              "on-surface": "#191c1d",
              "on-surface-variant": "#434654",
              "outline": "#737685",
              "on-primary": "#ffffff",
              "outline-variant": "#c3c6d6",
              "secondary": "#525f73"
            },
            fontFamily: { headline: ["Manrope"], body: ["Inter"] }
          }
        }
      }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .font-headline { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .btn-gradient { background: linear-gradient(135deg, #003d9b 0%, #0052cc 100%); }
        .input-focus-accent:focus-within { border-bottom: 2px solid #003d9b; }
    </style>
</head>
<body class="font-body text-on-surface min-h-screen flex flex-col">
    <header class="w-full px-6 py-6 flex items-center justify-between z-50">
        <a href="login.html" class="flex items-center gap-2 text-secondary hover:text-primary transition-colors">
            <span class="material-symbols-outlined">arrow_back_ios</span>
            <span class="font-medium text-sm">로그인으로 돌아가기</span>
        </a>
        <div class="text-blue-800 text-xl font-extrabold tracking-tighter font-headline">Eye Catch</div>
    </header>

    <main class="flex-grow flex items-center justify-center px-6 py-12">
        <div class="w-full max-w-md">
            <div class="mb-10 text-center md:text-left">
                <h1 class="font-headline text-4xl font-extrabold tracking-tight text-on-surface mb-3">새로운 계정 만들기</h1>
                <p class="text-on-surface-variant leading-relaxed">AI 기반 안전 모니터링 시스템, Eye Catch와 함께 사고 없는 현장을 만들어보세요.</p>
            </div>

            <form id="signupForm" class="bg-surface-container-lowest rounded-xl p-8 shadow-lg space-y-6">
                <div class="space-y-1.5">
                    <label class="block text-xs font-semibold text-on-surface-variant uppercase ml-1">이름</label>
                    <div class="bg-surface-container-high rounded-lg flex items-center px-4 py-3 input-focus-accent">
                        <span class="material-symbols-outlined text-outline mr-3">person</span>
                        <input id="signupName" type="text" class="bg-transparent border-none focus:ring-0 w-full" placeholder="홍길동" required>
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="block text-xs font-semibold text-on-surface-variant uppercase ml-1">이메일 주소</label>
                    <div class="bg-surface-container-high rounded-lg flex items-center px-4 py-3 input-focus-accent">
                        <span class="material-symbols-outlined text-outline mr-3">mail</span>
                        <input id="signupEmail" type="email" class="bg-transparent border-none focus:ring-0 w-full" placeholder="example@eyecatch.ai" required>
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="block text-xs font-semibold text-on-surface-variant uppercase ml-1">비밀번호</label>
                    <div class="bg-surface-container-high rounded-lg flex items-center px-4 py-3 input-focus-accent">
                        <span class="material-symbols-outlined text-outline mr-3">lock</span>
                        <input id="signupPassword" type="password" class="bg-transparent border-none focus:ring-0 w-full" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit" class="w-full text-center py-4 rounded-xl btn-gradient text-on-primary font-bold text-lg shadow-lg active:scale-95 transition-all">
                        회원가입 완료
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script>
        // 회원가입 처리 스크립트
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            
            // 데이터를 객체로 묶어 localStorage에 저장 (백엔드 DB 역할)
            const userData = {
                name: name,
                email: email,
                password: password
            };
            
            localStorage.setItem('eyeCatchUser', JSON.stringify(userData));
            
            alert('회원가입이 완료되었습니다! 로그인 페이지로 이동합니다.');
            window.location.href = 'login.html'; // 가입 완료 후 로그인 페이지로 이동
        });
    </script>
</body>
</html>
