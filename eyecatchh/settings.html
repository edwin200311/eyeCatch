<!DOCTYPE html>
<html lang="ko" class="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eye Catch - 설정</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; } .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; } </style>
</head>
<body class="text-slate-900 min-h-screen pb-28">
    <header class="fixed top-0 w-full z-50 bg-slate-50/70 backdrop-blur-xl shadow-sm flex items-center px-6 py-4">
        <h1 class="text-xl font-black text-blue-900">Eye Catch</h1>
    </header>

    <main class="pt-24 px-6 max-w-4xl mx-auto space-y-8">
        <section class="flex flex-col md:flex-row items-center gap-8 bg-white p-8 rounded-3xl shadow-sm">
            <div class="w-32 h-32 rounded-full overflow-hidden bg-slate-200">
                <span class="material-symbols-outlined text-6xl text-slate-400 mt-8 ml-8">person</span>
            </div>
            <div class="flex-1 text-center md:text-left">
                <!-- 자바스크립트로 이름이 들어갈 공간 -->
                <h1 id="profileName" class="text-3xl font-extrabold mb-1">사용자</h1>
                <p class="text-slate-500 font-medium">안전관리 총괄 책임자</p>
            </div>
            <div>
                <!-- 로그아웃 버튼: login.html로 이동 및 로컬스토리지 유지/삭제 로직 처리 -->
                <button onclick="location.href='login.html'" class="bg-blue-800 text-white px-6 py-2.5 rounded-xl font-bold flex items-center gap-2 hover:bg-blue-700 transition-colors">
                    <span class="material-symbols-outlined">logout</span> 로그아웃
                </button>
            </div>
        </section>

        <h3 class="text-lg font-bold px-2">환경 설정</h3>
        <div class="bg-white p-5 rounded-2xl flex items-center justify-between shadow-sm cursor-pointer hover:bg-slate-50">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center text-blue-700">
                    <span class="material-symbols-outlined">notifications_active</span>
                </div>
                <div>
                    <p class="font-bold text-sm">알림 및 경고</p>
                    <p class="text-xs text-slate-500">사고 발생 시 즉각 알림 수신</p>
                </div>
            </div>
            <div class="w-10 h-6 bg-blue-800 rounded-full relative px-1 flex items-center"><div class="w-4 h-4 bg-white rounded-full ml-auto"></div></div>
        </div>
    </main>

    <!-- 하단 네비게이션 바 -->
    <nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-4 pt-2 bg-white shadow-lg z-50 rounded-t-xl">
        <a href="main.html" class="flex flex-col items-center text-slate-500 px-5 py-2"><span class="material-symbols-outlined">videocam</span><span class="text-xs">모니터링</span></a>
        <a href="zone.html" class="flex flex-col items-center text-slate-500 px-5 py-2"><span class="material-symbols-outlined">grid_view</span><span class="text-xs">구역</span></a>
        <a href="history.html" class="flex flex-col items-center text-slate-500 px-5 py-2"><span class="material-symbols-outlined">warning</span><span class="text-xs">사건 내역</span></a>
        <a href="settings.html" class="flex flex-col items-center bg-blue-50 text-blue-800 rounded-2xl px-5 py-2"><span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">settings</span><span class="text-xs font-medium">설정</span></a>
    </nav>

    <script>
        // 프로필에 가입한 이름 띄우기
        window.onload = function() {
            const savedUser = JSON.parse(localStorage.getItem('eyeCatchUser'));
            if(savedUser && savedUser.name) {
                document.getElementById('profileName').textContent = savedUser.name;
            }
        };
    </script>
</body>
</html>
